packages:
  - "packages/*"
allowBuilds:
  esbuild: true

blockExoticSubdeps: true
minimumReleaseAge: 21600 # 15 days
minimumReleaseAgeExclude:
  - "@alwaysmeticulous/*"

trustPolicy: no-downgrade
trustPolicyExclude:
  - eslint-import-resolver-typescript@3.10.1
  - eslint-plugin-import@2.32.0
  - semver@5.7.2 || 6.3.1
  - undici-types@6.21.0
  - "@octokit/endpoint@9.0.6"

catalog:
  vitest: ^4.1.4
